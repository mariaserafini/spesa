<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Tracker — Accedi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page" style="visibility:hidden">

<div class="login-card card">
    <div class="login-logo">
        <div class="login-logo-icon">🏷️</div>
        <div class="login-logo-text">Price<span class="accent">Tracker</span></div>
    </div>
    <h1 class="login-title">Bentornato</h1>
    <p class="login-sub">Inserisci le tue credenziali per accedere.</p>
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nome@esempio.com" autocomplete="email" />
    </div>
    <div class="field mt-2">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="login-actions">
        <button class="btn btn-primary btn-full" id="btnLogin">Accedi</button>
        <div class="msg msg-error" id="errorMsg"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
    // Se già loggato, vai direttamente all'app
    (async () => {
        const session = await getSession();
        if (session) { window.location.href = 'index.html'; return; }
        document.body.style.visibility = 'visible';
    })();

    const btnLogin   = document.getElementById('btnLogin');
    const emailEl    = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const errorMsg   = document.getElementById('errorMsg');

    async function handleLogin() {
        errorMsg.classList.remove('visible');
        const email    = emailEl.value.trim();
        const password = passwordEl.value;
        if (!email || !password) {
            errorMsg.textContent = 'Inserisci email e password.';
            errorMsg.classList.add('visible');
            return;
        }
        btnLogin.disabled    = true;
        btnLogin.textContent = 'Accesso in corso…';
        try {
            await login(email, password);
            window.location.href = 'index.html';
        } catch {
            errorMsg.textContent = 'Credenziali non valide. Riprova.';
            errorMsg.classList.add('visible');
            btnLogin.disabled    = false;
            btnLogin.textContent = 'Accedi';
        }
    }

    btnLogin.addEventListener('click', handleLogin);
    [emailEl, passwordEl].forEach(el =>
        el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); })
    );
</script>
</body>
</html>
